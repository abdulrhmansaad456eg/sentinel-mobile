name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Check Flutter Setup
        run: |
          flutter doctor -v
          flutter --version

      - name: Build APK
        run: |
          echo "Starting build..."
          flutter build apk --release --verbose 2>&1 | tee build.log || true
          echo "Build finished with code $?"
          cat build.log | tail -100
          echo "Checking for APK..."
          ls -la build/app/outputs/flutter-apk/ 2>&1 || echo "APK directory not found"
          find . -name "*.apk" 2>/dev/null | head -5 || echo "No APK files found anywhere"

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-apk
          path: |
            **/*.apk
          if-no-files-found: warn
