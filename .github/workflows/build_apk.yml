name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          cat android/local.properties
          echo "Flutter root: $FLUTTER_ROOT"
          ls -la $FLUTTER_ROOT/packages/flutter_tools/gradle/ || echo "Directory check"

      - name: Install dependencies
        run: flutter pub get

      - name: Check Flutter Setup
        run: |
          flutter doctor -v
          flutter --version

      - name: Build APK
        run: |
          export FLUTTER_SDK=$FLUTTER_ROOT
          flutter build apk --release

      - name: List build outputs
        run: |
          echo "=== Looking for APK files ==="
          find build -name "*.apk" -type f 2>/dev/null
          echo "=== Build outputs directory ==="
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "Directory not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
